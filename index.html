<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect to My Socials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <button id="theme-toggle" class="theme-toggle">
        <i class="fas fa-sun"></i>
    </button>
    <div class="container">
        <h1>Welcome!</h1>
        <p>Choose where you'd like to go:</p>
        <div class="links">
            <a href="https://discord.gg/wa2zMnhMbn" target="_blank" class="link discord">
                <i class="fab fa-discord"></i> Discord Server
            </a>
            <a href="https://www.youtube.com/@pxssesixn" target="_blank" class="link youtube">
                <i class="fab fa-youtube"></i> YouTube Channel
            </a>
            <a href="https://x.com/pxssesixn" target="_blank" class="link twitter">
                <i class="fab fa-twitter"></i> Twitter/X
            </a>
            <a href="https://www.instagram.com/ihavepxssesixn/" target="_blank" class="link instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>
        <div class="bot-section">
            <div class="bot-header">
                <img src="https://via.placeholder.com/64x64/7289da/ffffff?text=Bot" alt="Bot Avatar" class="bot-avatar">
                <div>
                    <h2>Discord Bot</h2>
                    <p>Add my Discord bot to your server:</p>
                </div>
            </div>
            <a href="https://discord.com/oauth2/authorize?client_id=1480583984378413237&permissions=8&integration_type=0&scope=bot" target="_blank" class="link bot-invite">
                <i class="fas fa-robot"></i> Add Bot
            </a>
            <div class="bot-status">
                <span class="status-dot online"></span>
                <span>Bot Status: Online</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
